services:
  postgres:
    image: postgres:16-alpine
    container_name: kairos-assistant-db
    environment:
      - POSTGRES_USER=kairos
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=kairos_assistant
    volumes:
      - kairos-assistant-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairos -d kairos_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - kairos_network

  backend:
    build: ./backend
    container_name: kairos-assistant-api
    ports:
      - "8070:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openrouter/auto}
      - DATABASE_URL=postgresql+asyncpg://kairos:${POSTGRES_PASSWORD}@postgres:5432/kairos_assistant
      - JWT_SECRET=${JWT_SECRET}
      - TTS_API_KEY=${TTS_API_KEY}
      - TTS_PROVIDER=${TTS_PROVIDER:-elevenlabs}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kairos_network

  frontend:
    build: .
    container_name: kairos-assistant-frontend
    ports:
      - "3050:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.kairos-assistant.fbautomacao.space
      - NEXT_PUBLIC_API_KEY=${API_KEY}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - kairos_network

networks:
  kairos_network:
    driver: bridge

volumes:
  kairos-assistant-pgdata:
